<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#10b981">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>Lista de Compras</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 120px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            animation: fadeIn 0.5s;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .add-section {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            animation: slideUp 0.5s;
        }

        .input-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        input {
            padding: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        input[type="number"] {
            text-align: center;
        }

        .btn-add {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3);
        }

        .btn-add:active {
            transform: translateY(0);
        }

        .list-section {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: slideUp 0.5s 0.1s backwards;
        }

        .item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: #f9fafb;
            border-radius: 12px;
            margin-bottom: 10px;
            transition: all 0.3s;
            animation: itemAppear 0.3s;
        }

        .item:hover {
            background: #f3f4f6;
            transform: translateX(5px);
        }

        .item.checked {
            opacity: 0.6;
        }

        .item.checked .item-name {
            text-decoration: line-through;
        }

        .item input[type="checkbox"] {
            width: 24px;
            height: 24px;
            margin-right: 15px;
            cursor: pointer;
            accent-color: #10b981;
        }

        .item-name {
            flex: 1;
            font-weight: 600;
            color: #1f2937;
            font-size: 16px;
        }

        .item-details {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-right: 15px;
            font-size: 14px;
            color: #6b7280;
        }

        .item-price {
            min-width: 70px;
            text-align: right;
        }

        .item-qty {
            min-width: 40px;
            text-align: center;
        }

        .item-total {
            min-width: 80px;
            text-align: right;
            font-weight: 700;
            color: #10b981;
            font-size: 15px;
        }

        .btn-delete {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .btn-delete:hover {
            background: #dc2626;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #6b7280;
            font-style: italic;
        }

        .total-section {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 20px 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.4);
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.2em;
            font-weight: 700;
            z-index: 100;
            animation: slideUp 0.5s 0.2s backwards;
        }

        .total-label {
            opacity: 0.9;
        }

        .total-value {
            font-size: 1.5em;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes itemAppear {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @media (max-width: 640px) {
            h1 { font-size: 2em; }
            .input-row { 
                grid-template-columns: 1fr;
            }
            .item {
                flex-wrap: wrap;
            }
            .item-details {
                width: 100%;
                justify-content: space-around;
                margin: 10px 0 0 0;
            }
            .total-section {
                flex-direction: column;
                gap: 5px;
                padding: 15px 30px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛒 Lista de Compras</h1>
        </header>

        <div class="add-section">
            <div class="input-row">
                <input type="text" id="itemInput" placeholder="Item (ex: Arroz)" />
                <input type="number" id="priceInput" placeholder="R$ Preço" step="0.01" min="0" />
                <input type="number" id="qtyInput" placeholder="Qtd" step="1" min="1" value="1" />
            </div>
            <button class="btn-add" onclick="addItem()">+ Adicionar</button>
        </div>

        <div class="list-section">
            <div id="itemsList"></div>
        </div>

        <div class="total-section">
            <span class="total-label">Total:</span>
            <span class="total-value" id="totalValue">R$ 0,00</span>
        </div>
    </div>

    <script>
        let items = [];

        function loadItems() {
            const saved = localStorage.getItem('shoppingListSimple');
            items = saved ? JSON.parse(saved) : [];
            render();
        }

        function saveItems() {
            localStorage.setItem('shoppingListSimple', JSON.stringify(items));
        }

        function addItem() {
            const itemInput = document.getElementById('itemInput');
            const priceInput = document.getElementById('priceInput');
            const qtyInput = document.getElementById('qtyInput');
            
            const name = itemInput.value.trim();
            const price = parseFloat(priceInput.value) || 0;
            const qty = parseInt(qtyInput.value) || 1;
            
            if (!name) {
                itemInput.focus();
                return;
            }
            
            items.push({
                id: Date.now(),
                name,
                price,
                qty,
                checked: false
            });
            
            itemInput.value = '';
            priceInput.value = '';
            qtyInput.value = '1';
            itemInput.focus();
            
            saveItems();
            render();
        }

        function toggleItem(id) {
            const item = items.find(i => i.id === id);
            if (item) {
                item.checked = !item.checked;
                saveItems();
                render();
            }
        }

        function deleteItem(id) {
            items = items.filter(i => i.id !== id);
            saveItems();
            render();
        }

        function formatPrice(value) {
            return value.toLocaleString('pt-BR', { 
                minimumFractionDigits: 2,
                maximumFractionDigits: 2 
            });
        }

        function render() {
            const container = document.getElementById('itemsList');
            
            if (items.length === 0) {
                container.innerHTML = '<div class="empty-state">Nenhum item na lista. Comece adicionando! 🛒</div>';
                document.getElementById('totalValue').textContent = 'R$ 0,00';
                return;
            }
            
            let total = 0;
            
            container.innerHTML = items.map(item => {
                const itemTotal = item.price * item.qty;
                total += itemTotal;
                
                return `
                    <div class="item ${item.checked ? 'checked' : ''}">
                        <input type="checkbox" ${item.checked ? 'checked' : ''} 
                               onchange="toggleItem(${item.id})">
                        <span class="item-name">${item.name}</span>
                        <div class="item-details">
                            <span class="item-price">R$ ${formatPrice(item.price)}</span>
                            <span class="item-qty">× ${item.qty}</span>
                            <span class="item-total">R$ ${formatPrice(itemTotal)}</span>
                        </div>
                        <button class="btn-delete" onclick="deleteItem(${item.id})">×</button>
                    </div>
                `;
            }).join('');
            
            document.getElementById('totalValue').textContent = `R$ ${formatPrice(total)}`;
        }

        document.getElementById('itemInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') {
                document.getElementById('priceInput').focus();
            }
        });

        document.getElementById('priceInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') {
                document.getElementById('qtyInput').focus();
            }
        });

        document.getElementById('qtyInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') {
                addItem();
            }
        });

        loadItems();

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>
</body>
</html>
